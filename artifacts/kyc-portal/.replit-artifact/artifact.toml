kind = "web"
previewPath = "/"
title = "KYC Portal Dashboard"
version = "1.0.0"
id = "artifacts/kyc-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25427

[services.development]
run = "pnpm --filter @workspace/kyc-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kyc-portal", "run", "build" ]
publicDir = "artifacts/kyc-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25427"
BASE_PATH = "/"
